# Equivalence workflow configuration v1.61
# Values here can be edited without modifying the R script.

correction:
  enabled: true
  model: "TLS"   # TLS, OLS, MEAN_RATIO, NONE
  fit_range:
    lower_rm: 0
    upper_factor_daily_lv: 1.5

daily_assessment:
  decision_metric: "CI95"   # Udaily, CI95, Utot, Udiff
  lv_window_lower_factor: 0.7
  lv_window_upper_factor: 1.3
  min_n_ok: 15
  min_n_low_n: 10

annual_assessment:
  min_consecutive_pairs_for_V: 40
  use_effective_sample_size: true
  auxiliary_autocorrelation_allowed: true
  auxiliary_autocorrelation_file: null
  auxiliary_min_consecutive_pairs_for_V: 40

diagnostics:
  mbe_threshold: 1.0
  sd_diff_threshold: 2.5
  skewness_threshold: 0.5
  kurtosis_threshold: 4.0
  ubscm_threshold: 2.5

linearity:
  r2_threshold_type_testing: 0.95
  r2_threshold_ongoing: 0.90

rm_screening:
  duplicate_abs_threshold: 2.0
  fail_pct_threshold: 5.0

limit_values:
  PM10:
    daily: 45
    annual: 20
  PM2.5:
    daily: 25
    annual: 10

dqo:
  PM10:
    daily: 25
    annual: 20
  PM2.5:
    daily: 25
    annual: 30

vrep:
  PM10: 4.04
  PM2.5: 5.46
